kind = "web"
previewPath = "/"
title = "SpeakUp"
version = "1.0.0"
id = "artifacts/speakup-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24784

[services.development]
run = "pnpm --filter @workspace/speakup-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/speakup-web", "run", "build" ]
publicDir = "artifacts/speakup-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24784"
BASE_PATH = "/"
